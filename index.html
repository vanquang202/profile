			-moz-column-count: 4;
			column-count: 4;
			-webkit-column-gap: 15px;
			-moz-column-gap: 15px;
			column-gap: 15px;
		}

		#app img {
			width: 100%;
		}

		.image-preview-container {
			position: fixed;
			top: 0;
			left: 0;
			z-index: 9999;
			width: 100vw;
			height: 100vh;
			background: rgba(0, 0, 0, 0.6);
			transition: all 0.3s;
			display: none;
			color: #fff;
			will-change: transform;
			user-select: none;
		}

		.image-preview-container.show {
			animation: show 0.5s forwards;
			-webkit-animation: show 0.5s forwards;
		}

		.image-preview-container.hiding .preview-header {
			animation: opacityAnimation 0.5s forwards reverse;
		}

		.image-preview-container img {
			transition: all 0.5s;
			transform: translateX(var(--offsetX)) translateY(var(--offsetY)) translateZ(0) scale(var(--scale), var(--scale)) rotate(var(--rotate));
		}

		.image-preview-container .image-container {
			width: 100% !important;
			height: 100% !important;
			overflow: hidden;
		}

		.image-preview-container .preview-header {
			height: 60px;
			background: rgba(0, 0, 0, 0.2);
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0 2vw 0 1vw;
			position: relative;
			z-index: 90;
			animation: opacityAnimation 0.5s forwards;
		}

		.image-preview-container .preview-header .nums {
			display: flex;
			justify-content: flex-start;
			align-items: center;
		}

		.image-preview-container .preview-header .nums p {
			font-weight: 300;
			padding: 4px 8px;
			font-size: 16px;
		}

		.image-preview-container .preview-header button {
			background: none;
			border: none;
			outline: none;
			font-size: 18px;
			color: #fff;
			padding: 4px 8px;
			border-radius: 4px;
			-webkit-border-radius: 4px;
			-moz-border-radius: 4px;
			-ms-border-radius: 4px;
			-o-border-radius: 4px;
			position: relative;
		}

		.image-preview-container .preview-header .tool-btn button {
			margin-left: 2vw;
		}

		.image-preview-container .preview-header button:hover::after,
		.image-preview-container .preview-header button:hover::before {
			display: block;
		}

		.image-preview-container .preview-header button::before {
			content: '';
			position: absolute;
			left: 50%;
			top: calc(130% - 5px);
			transform: translateX(-50%);
			border-right: 5px solid transparent;
			border-left: 5px solid transparent;
			border-bottom: 5px solid #000;
			display: none;
		}

		.image-preview-container .preview-header button::after {
			content: attr(data-tooltip);
			font-size: 12px;
			position: absolute;
			left: 50%;
			top: 130%;
			transform: translateX(-50%);
			background: #000;
			padding: 2px 5px;
			white-space: nowrap;
			-webkit-transform: translateX(-50%);
			-moz-transform: translateX(-50%);
			-ms-transform: translateX(-50%);
			-o-transform: translateX(-50%);
			border-radius: 2px;
			-webkit-border-radius: 2px;
			-moz-border-radius: 2px;
			-ms-border-radius: 2px;
			-o-border-radius: 2px;
			display: none;
		}

		.image-preview-container .preview-header button:hover {
			background: rgba(0, 0, 0, 0.2);
			cursor: pointer;
		}

		#prev,
		#next {
			background: none;
			border: none;
			outline: none;
			position: absolute;
			top: 50%;
			color: #f6f6f6;
			padding: 20px 10px;
			cursor: pointer;
		}

		#prev i,
		#next i {
			font-size: 24px;
		}

		#prev {
			left: 1%;
		}

		#next {
			right: 1%;
		}

		.zoom-in {
			cursor: zoom-in;
		}

		.moving {
			transition: none !important;
			-webkit-transition: none !important;
			-moz-transition: none !important;
			-ms-transition: none !important;
			-o-transition: none !important;
		}

		@keyframes show {
			0% {
				background: rgba(0, 0, 0, 0);
			}

			100% {
				background: rgba(0, 0, 0, 0.6);
			}
		}

		@keyframes opacityAnimation {
			0% {
				opacity: 0;
			}

			100% {
				opacity: 1;
			}
		}

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--airplane-left-fill-color: #000000;
			--airplane-right-fill-color: #000000;
		}

		body {
			font-family: Arial, Helvetica, sans-serif;
		}

		#airwayGrid {
			width: 100%;
			height: 0px;

			background: url('../assets/airway_grid_8x8.svg') repeat;

			overflow: hidden;
		}

		.airplaneLine {
			width: calc(100vw / 4);
			height: 6px;
		}

		.airplaneLeft {
			position: relative;

			display: flex;
			align-items: center;

			right: 0;

			transform: rotate(180deg);

			-webkit-animation: ease-in-out infinite;
			-webkit-animation-name: flyLeft;
			-webkit-animation-duration: 13s;
		}

		.airplaneLeft svg {
			fill: var(--airplane-left-fill-color);
			transform: rotate(180deg);
		}

		.airplaneLeft .airplaneLine {
			background: linear-gradient(270deg,
					var(--airplane-left-fill-color) 0%,
					rgba(163, 57, 227, 0) 100%);
			opacity: 0.5;

			margin-right: -15px;
		}

		.airplaneRight {
			position: relative;

			display: flex;
			align-items: center;

			-webkit-animation: ease-in-out infinite;
			-webkit-animation-name: flyRight;
			-webkit-animation-duration: 10s;
		}

		.airplaneRight svg {
			fill: var(--airplane-right-fill-color);
			transform: rotate(180deg);
		}

		.airplaneRight .airplaneLine {
			background: linear-gradient(270deg,
					var(--airplane-right-fill-color) 0%,
					rgba(163, 57, 227, 0) 100%);
			opacity: 0.5;

			margin-right: -15px;
		}

		.airplane svg {
			margin-left: -20px;
		}

		@-webkit-keyframes flyRight {
			0% {
				left: calc(0px - ((100vw / 4) + 30px));
			}

			100% {
				left: 100%;
			}
		}

		@-webkit-keyframes flyLeft {
			0% {
				right: calc(0px - ((100vw / 4) + 30px));
			}

			100% {
				right: 100%;
			}
		}
	</style>

	<style>
		* {
			font-family: 'Anton', sans-serif;

		.aossss {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
		}

		.loading {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: black;
			z-index: 900000000;
		}

		.loading p {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}

		.lds-heart {
			display: inline-block;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 200px;
			height: 200px;
			transform: rotate(45deg);
			transform-origin: 40px 40px;
		}

		.lds-heart div {
			top: 32px;
			left: 32px;
			position: absolute;
			width: 32px;
			height: 32px;
			background: #fff;
			animation: lds-heart 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
		}

		.lds-heart div:after,
		.lds-heart div:before {
			content: " ";
			position: absolute;
			display: block;
			width: 32px;
			height: 32px;
			background: #fff;
		}

		.lds-heart div:before {
			left: -24px;
			border-radius: 50% 0 0 50%;
		}

		.lds-heart div:after {
			top: -24px;
			border-radius: 50% 50% 0 0;
		}

		@keyframes lds-heart {
			0% {
				transform: scale(0.95);
			}

			5% {
				transform: scale(1.1);
			}

			39% {
				transform: scale(0.85);
			}

			45% {
				transform: scale(1);
			}

			60% {
				transform: scale(0.95);
			}

			100% {
				transform: scale(0.9);
			}
		}


		#airwayGrid {

			width: 100% !important;

		}

	<script>
		const defaultConfig = {
			height: 130,
			lazy: true,
			backgroundColor: '',
			resizable: false,
			colorFromLeft: 'blue',
			colorFromRight: 'red',
			log: false,
		};

		function getRandomSeconds(min, max) {
			min = Math.ceil(min);
			max = Math.floor(max);
			return Math.floor(Math.random() * (max - min) + min) * 1000;
		}

		class Airway {
			container;
			config;
			interval = null;

			constructor(container, config) {
				this.setContainer(container);
				this.config = { ...defaultConfig, ...config };
			}

			#log(msg, type) {
				if (!this.config.log) return;

				if (console[type]) {
					console[type](msg);
					return;
				}

				console.log(msg);
			}

			setContainer(container) {
				if (typeof container === 'string') {
					return (this.container = document.querySelector(container));
				}

				this.container = document.querySelector(container);
			}

			setConfig(config) {
				this.config = { ...defaultConfig, ...config };
			}

			configContainer() {
				this.container.style.background = this.config.background;
				this.container.style.height = `${this.config.height}px`;

				if (this.config.resizable) this.container.style.resize = 'vertical';

				document.documentElement.style.setProperty(
					'--airplane-left-fill-color',
					this.config.colorFromLeft,
				);
				document.documentElement.style.setProperty(
					'--airplane-right-fill-color',
					this.config.colorFromRight,
				);
			}

			generateAirplane() {
				const randomClass = Math.random() < 0.5 ? 'airplaneRight' : 'airplaneLeft';
				const randomPlane = `
        <div class="${randomClass} airplaneContent">
            <div class="airplaneLine"></div>
            <svg width="34" height="32" viewBox="0 0 34 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg" >
                <path d="M23.579 -8.39233e-05H20.2106L11.7895 13.4736H2.52632C1.12842 13.4736 0 14.6021 0 16C0 17.3979 1.12842 18.5263 2.52632 18.5263H11.7895L20.2106 32H23.579L19.3685 18.5263H28.6317L31.158 21.8947H33.6843L32.0001 16L33.6843 10.1052H31.158L28.6317 13.4736H19.3685L23.579 -8.39233e-05Z" />
            </svg>
        </div>
        `;

				this.container.insertAdjacentHTML('beforeend', randomPlane);
			}

			clearAirplanes(maxLimit) {
				const airplanesFlying = this.container.querySelectorAll('.airplaneContent');

				airplanesFlying.forEach((airplane, index) => {
					if (index > maxLimit - 1) {
						airplane.remove();
						this.#log('Airplane removed');
					}
				});
			}

			updateTimeout() {
				const time = this.config.lazy
					? getRandomSeconds(3, 6)
					: getRandomSeconds(0, 0);
				const airplaneCount =
					this.container.querySelectorAll('.airplaneContent').length;

				const containerHeightLimit = this.container.offsetHeight;
				const airplaneCountLimit = Math.floor(containerHeightLimit / 32);

				this.#log(
					`INFO: This container fits: ${airplaneCountLimit} airplane(s) and currently we have: ${airplaneCount} airplane(s) flying!`,
					'warn',
				);

				if (airplaneCount >= airplaneCountLimit) {
					this.clearAirplanes(airplaneCountLimit);
				} else {
					this.generateAirplane();
				}

				clearInterval(this.myInterval);

				if (airplaneCount < airplaneCountLimit)
					this.myInterval = setInterval(() => this.updateTimeout.call(this), time);
				else {
					this.#log('INFO: Airplane limit reached!', 'info');
				}
			}

			executeAirplanes() {
				this.configContainer();
				this.interval = setInterval(() => this.updateTimeout.call(this), 0);

				const containerHeight = this.container.offsetHeight;

				new ResizeObserver(() => {
					const newContainerHeight = this.container.offsetHeight;
					if (containerHeight === newContainerHeight) return;

					this.#log(`Container has been resized to: ${newContainerHeight}`);
					this.updateTimeout();
				}).observe(this.container);
			}
		}

		/**
		 * Client Code
		 */
		const myAirway = new Airway('#airwayGrid', {
			height: '200',
			colorFromLeft: '#a339e3',
			colorFromRight: '#2ec662',
			resizable: false,
			lazy: false,
		});

		myAirway.executeAirplanes();
	</script>

	<script>
		const HDS = function (el = null, options = {}) {
			class slider {
				constructor(options) {
					this.delay = 0; // delay in ms to begin the timer
					this.speed = 5000; // time in ms 'till next slide
					this.transition = 600; // time in ms for animation speed
					this.pagination = true;
					this.navigation = true;

					for (const k in options) {
						this[k] = options[k];
					}

					this.delay = parseInt(this.delay);
					this.speed = parseInt(this.speed);
					this.transition = parseInt(this.transition);
				}
			}

			const $ = {
				VARS: {
					slider: null,
					slides: null,
					options: {},
					timer: null,
					pagination: null,
				},
				init: async function () {
					if (el === null) {
						console.error("Please select a container for the slider");
						return;
					}
					$.VARS.slider = document.querySelector(el);
					$.VARS.options = new slider(options);

					await $.create();
				},
				create: async function () {
					const slides = document.createElement("div");
					slides.classList.add("hds_slides_container");

					const content = $.VARS.slider.innerHTML;
					slides.innerHTML = content;
					$.VARS.slider.innerHTML = "";
					$.VARS.slider.append(slides);
					$.VARS.slider.classList.add("hds_slider");

					$.VARS.slides = $.VARS.slider.getElementsByClassName("hds_slides_container")[0].children;
					for (let i = 0; i < $.VARS.slides.length; i++) {
						$.VARS.slides[i].classList.add("hds_slide");
					}

					$.VARS.slider.style.setProperty("--slide-transition-speed", $.VARS.options.transition + "ms");

					if ($.VARS.options.navigation === true) {
						$.navigation();
					}

					if ($.VARS.options.pagination === true) {
						$.pagination();
					}

					$.setActive($.VARS.slides[0]);
					setTimeout($.start, $.VARS.options.delay);
				},
				setActive: function (slide) {
					for (let i = 0; i < $.VARS.slides.length; i++) {
						$.VARS.slides[i].classList.remove("hds_slide_active");
					}
					slide.classList.add("hds_slide_active");

					if ($.VARS.options.pagination === true) {
						let index = 0;
						for (let i = 0; i < $.VARS.slides.length; i++) {
							if ($.VARS.slides[i].classList.contains("hds_slide_active")) {
								index = i;
								break;
							}
						}

						for (let i = 0; i < $.VARS.pagination.length; i++) {
							$.VARS.pagination[i].classList.remove("hds_pagination_item_active");
						}
						$.VARS.pagination[index].classList.add("hds_pagination_item_active");
					}
				},
				start: function () {
					$.VARS.timer = setInterval($.next, $.VARS.options.speed);
				},
				next: function () {
					clearInterval($.VARS.timer);
					const active = $.VARS.slider.getElementsByClassName("hds_slide_active")[0];
					if (active.nextElementSibling === null) {
						$.setActive($.VARS.slides[0]);
					} else {
						$.setActive(active.nextElementSibling);
					}
					$.start();
				},
				prev: function () {
					clearInterval($.VARS.timer);

					const active = $.VARS.slider.getElementsByClassName("hds_slide_active")[0];
					if (active.previousElementSibling === null) {
						$.setActive($.VARS.slides[$.VARS.slides.length - 1]);
					} else {
						$.setActive(active.previousElementSibling);
					}

					$.start();
				},
				navigation: function () {
					const nav = `<div class = "hds_nav_item hds_prev"><</div><div class = "hds_nav_item hds_next">></div>`;
					$.VARS.slider.insertAdjacentHTML("beforeend", nav);

					const prev = $.VARS.slider.getElementsByClassName("hds_prev")[0];
					const next = $.VARS.slider.getElementsByClassName("hds_next")[0];

					prev.addEventListener("click", $.prev);
					next.addEventListener("click", $.next);
				},
				pagination: function () {
					let html = '<div class = "hds_pagination">';
					for (let i = 0; i < $.VARS.slides.length; i++) {
						html += `<div class = "hds_pagination_item"></div>`;
					}
					html += "</div>";

					$.VARS.slider.insertAdjacentHTML("beforeend", html);
					$.VARS.pagination = $.VARS.slider.getElementsByClassName("hds_pagination_item");

					for (let i = 0; i < $.VARS.pagination.length; i++) {
						$.VARS.pagination[i].addEventListener("click", function () {
							if (this.classList.contains("hds_pagination_item_active")) {
								return;
							}
							let index = 0;
							for (let i = 0; i < $.VARS.pagination.length; i++) {
								if ($.VARS.pagination[i] === this) {
									index = i;
									break;
								}
							}
							$.setActive($.VARS.slides[index]);
						});
					}
				},
			};

			$.init(el, options);
		};
	</script>
